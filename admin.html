<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UXD2 AI 활동기록 어드민</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg:      #f4f5f7;
  --bg2:     #ffffff;
  --bg3:     #f0f1f4;
  --bg4:     #e8e9ee;
  --border:  #e2e4ea;
  --accent:  #3a6e1e;
  --accent2: #4f8f2a;
  --accent-light: #eef5e8;
  --text1:   #1a1c22;
  --text2:   #5a5e6e;
  --text3:   #9ea3b8;
  --red:     #e05050;
  --blue:    #3a6ef7;
  --gold:    #c87800;
  --green:   #3a8c50;
  --shadow:  0 2px 12px rgba(0,0,0,.06);
  --shadow2: 0 4px 24px rgba(0,0,0,.10);
  --radius:  14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family:'Pretendard',sans-serif; background:var(--bg); color:var(--text1); min-height:100vh; }

/* ── SETUP ── */
.setup-screen {
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem;
  background: linear-gradient(135deg, #f0f5ea 0%, #e8f0ff 100%);
}
.setup-card {
  background:#fff; border-radius:24px; padding:48px 44px; width:100%; max-width:440px;
  box-shadow: 0 8px 40px rgba(0,0,0,.10); animation: fadeUp .4s ease;
}
.setup-logo { font-size:11px; font-weight:700; letter-spacing:.2em; color:var(--accent); margin-bottom:10px; }
.setup-title { font-size:26px; font-weight:800; color:var(--text1); margin-bottom:6px; line-height:1.3; }
.setup-sub { font-size:13px; color:var(--text2); margin-bottom:36px; }
.setup-field { margin-bottom:14px; }
.setup-field label { font-size:11px; font-weight:700; color:var(--text3); letter-spacing:.08em; text-transform:uppercase; display:block; margin-bottom:6px; }
.setup-field input {
  width:100%; background:#f8f9fb; border:1.5px solid var(--border);
  border-radius:10px; padding:12px 14px; color:var(--text1);
  font-family:'Pretendard',sans-serif; font-size:14px; outline:none; transition:border-color .15s;
}
.setup-field input:focus { border-color:var(--accent); background:#fff; }
.setup-field input::placeholder { color:var(--text3); }
.setup-btn {
  width:100%; margin-top:22px; background:var(--accent); color:#fff;
  font-family:'Pretendard',sans-serif; font-size:14px; font-weight:700;
  border:none; border-radius:12px; padding:15px; cursor:pointer; transition:all .15s;
}
.setup-btn:hover { background:var(--accent2); transform:translateY(-1px); box-shadow:0 4px 16px rgba(58,110,30,.3); }
.setup-err { font-size:13px; color:var(--red); margin-top:10px; text-align:center; }

/* ── TOPBAR ── */
.topbar {
  position:sticky; top:0; z-index:200;
  background:rgba(255,255,255,.9); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); padding:0 24px;
  display:flex; align-items:center; justify-content:space-between; height:60px;
  box-shadow:0 1px 8px rgba(0,0,0,.05);
}
.topbar-brand { display:flex; align-items:center; gap:10px; }
.topbar-logo { font-size:10px; font-weight:800; letter-spacing:.16em; color:var(--accent); }
.topbar-divider { width:1px; height:18px; background:var(--border); }
.topbar-title { font-size:14px; font-weight:600; color:var(--text1); }
.topbar-right { display:flex; align-items:center; gap:10px; }
.topbar-stat { font-size:12px; color:var(--text2); }
.topbar-stat span { color:var(--accent); font-weight:700; }
.tb-btn {
  font-family:'Pretendard',sans-serif; font-size:12px; font-weight:600;
  border-radius:8px; padding:7px 14px; cursor:pointer; transition:all .15s; border:none;
}
.tb-refresh { background:var(--bg3); color:var(--text2); }
.tb-refresh:hover { background:var(--border); color:var(--text1); }
.tb-logout { background:none; color:var(--text3); border:1px solid var(--border); }
.tb-logout:hover { border-color:var(--red); color:var(--red); }
.menu-btn { display:none; background:none; border:none; font-size:20px; cursor:pointer; color:var(--text2); }

/* ── LAYOUT ── */
.main { display:flex; min-height:calc(100vh - 60px); }

/* ── SIDEBAR ── */
.sidebar {
  width:220px; flex-shrink:0; border-right:1px solid var(--border);
  padding:20px 12px; position:sticky; top:60px; height:calc(100vh - 60px);
  overflow-y:auto; background:#fff; transition:transform .25s;
}
.sidebar-section { margin-bottom:24px; }
.sidebar-label { font-size:10px; font-weight:700; color:var(--text3); letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; padding:0 8px; }
.search-inp {
  width:100%; background:var(--bg3); border:1.5px solid transparent;
  border-radius:10px; padding:9px 12px; color:var(--text1);
  font-family:'Pretendard',sans-serif; font-size:13px; outline:none; transition:all .15s;
}
.search-inp:focus { border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px rgba(58,110,30,.08); }
.search-inp::placeholder { color:var(--text3); }
.filter-btn {
  display:flex; align-items:center; gap:8px; width:100%; padding:8px 10px;
  border-radius:9px; border:none; background:none; color:var(--text2);
  font-family:'Pretendard',sans-serif; font-size:13px; cursor:pointer; transition:all .12s; text-align:left;
}
.filter-btn:hover { background:var(--bg3); color:var(--text1); }
.filter-btn.active { background:var(--accent-light); color:var(--accent); font-weight:600; }
.filter-btn .badge {
  margin-left:auto; font-size:11px; font-weight:600;
  background:var(--bg4); color:var(--text3); padding:1px 7px; border-radius:10px;
}
.filter-btn.active .badge { background:rgba(58,110,30,.15); color:var(--accent); }

/* ── CONTENT ── */
.content { flex:1; padding:24px; overflow-y:auto; min-width:0; }

/* ── STATS ── */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
.stat-card {
  background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  padding:20px 22px; box-shadow:var(--shadow); transition:box-shadow .15s;
}
.stat-card:hover { box-shadow:var(--shadow2); }
.stat-label { font-size:11px; font-weight:700; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:8px; }
.stat-value { font-size:30px; font-weight:800; color:var(--text1); line-height:1; }
.stat-sub { font-size:12px; color:var(--text3); margin-top:4px; }
.stat-card.c-accent .stat-value { color:var(--accent); }
.stat-card.c-blue   .stat-value { color:var(--blue); }
.stat-card.c-gold   .stat-value { color:var(--gold); }
.stat-card.c-green  .stat-value { color:var(--green); }

/* ── CARDS HEADER ── */
.cards-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.cards-title { font-size:13px; font-weight:600; color:var(--text2); }

/* ── FILTER BAR ── */
  .filter-bar { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; margin-bottom:12px; box-shadow:var(--shadow); }
  .filter-bar-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .filter-bar-title { font-size:13px; font-weight:600; color:var(--text2); }
  .filter-reset-btn { font-family:'Pretendard',sans-serif; font-size:12px; font-weight:600; color:var(--text3); background:none; border:1px solid var(--border); border-radius:7px; padding:5px 12px; cursor:pointer; transition:all .15s; }
  .filter-reset-btn:hover { border-color:var(--red); color:var(--red); }
  .filter-fields { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .filter-field { display:flex; flex-direction:column; gap:5px; position:relative; }
  .filter-field-label { font-size:10px; font-weight:700; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; }
  /* 멀티셀렉트 */
  .ms-wrap { position:relative; }
  .ms-trigger {
    display:flex; align-items:center; justify-content:space-between;
    background:var(--bg3); border:1.5px solid transparent; border-radius:9px;
    padding:8px 11px; cursor:pointer; transition:all .15s; user-select:none;
  }
  .ms-trigger:hover, .ms-wrap.open .ms-trigger { border-color:var(--accent); background:#fff; }
  .ms-placeholder { font-size:13px; color:var(--text3); }
  .ms-placeholder.has-val { color:var(--text1); font-weight:600; }
  .ms-arrow { font-size:10px; color:var(--text3); transition:transform .15s; }
  .ms-wrap.open .ms-arrow { transform:rotate(180deg); }
  .ms-dropdown {
    position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:500;
    background:#fff; border:1px solid var(--border); border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.1); overflow-y:auto; max-height:200px;
  }
  .ms-dropdown.hidden { display:none; }
  .ms-item {
    display:flex; align-items:center; gap:10px; padding:9px 14px;
    cursor:pointer; transition:background .1s; font-size:13px; color:var(--text1);
  }
  .ms-item:hover { background:var(--bg3); }
  .ms-item input[type="checkbox"] { accent-color:var(--accent); width:14px; height:14px; cursor:pointer; flex-shrink:0; }
  /* 소재명 다중입력 */
  .multi-inp-wrap {
    background:var(--bg3); border:1.5px solid transparent; border-radius:9px;
    padding:6px 10px; display:flex; flex-wrap:wrap; gap:5px; align-items:center;
    min-height:38px; transition:all .15s; cursor:text;
  }
  .multi-inp-wrap:focus-within { border-color:var(--accent); background:#fff; }
  .multi-inp-tag {
    display:flex; align-items:center; gap:5px; font-size:12px; font-weight:600;
    color:var(--accent); background:var(--accent-light); border:1px solid rgba(58,110,30,.2);
    padding:2px 8px; border-radius:20px;
  }
  .multi-inp-tag button { background:none; border:none; color:var(--accent); cursor:pointer; font-size:13px; padding:0; line-height:1; }
  .multi-inp-tag button:hover { color:var(--red); }
  .multi-inp-field { border:none; background:none; outline:none; font-family:'Pretendard',sans-serif; font-size:13px; color:var(--text1); min-width:80px; flex:1; }
  .multi-inp-field::placeholder { color:var(--text3); }
  /* 필터 태그 */
  .filter-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
  .filter-tag { display:flex; align-items:center; gap:6px; background:var(--accent-light); border:1px solid rgba(58,110,30,.2); color:var(--accent); font-size:12px; font-weight:600; padding:4px 10px; border-radius:20px; }
  .filter-tag-x { background:none; border:none; color:var(--accent); cursor:pointer; font-size:14px; padding:0; line-height:1; }
  .filter-tag-x:hover { color:var(--red); }
  .filter-sort-bar { display:flex; align-items:center; gap:12px; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
  .filter-sort-label { font-size:11px; font-weight:700; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; white-space:nowrap; }
  .filter-sort-btns { display:flex; gap:6px; }
  .sort-tab {
    font-family:'Pretendard',sans-serif; font-size:12px; font-weight:600;
    color:var(--text2); background:var(--bg3); border:1px solid var(--border);
    border-radius:7px; padding:6px 14px; cursor:pointer; transition:all .15s;
  }
  .sort-tab:hover { background:var(--border); color:var(--text1); }
  .sort-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .export-btns { display:flex; gap:6px; margin-left:auto; }
  .export-btn {
    display:flex; align-items:center; gap:5px;
    font-family:'Pretendard',sans-serif; font-size:12px; font-weight:600;
    color:var(--text2); background:#fff; border:1px solid var(--border);
    border-radius:8px; padding:6px 13px; cursor:pointer; transition:all .15s;
    white-space:nowrap;
  }
  .export-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
  .export-btn:disabled { opacity:.5; cursor:wait; }
  .del-unnamed-btn:hover { border-color:var(--red) !important; color:var(--red) !important; background:rgba(224,80,80,.06) !important; }
  .export-icon { font-size:13px; }
  @media (max-width:768px) { .export-label { display:none; } .export-btn { padding:6px 10px; } }


  /* 선택 액션 바 */
  .sel-action-bar {
    display:flex; align-items:center; gap:10px;
    background:#fff; border:1px solid var(--border); border-radius:var(--radius);
    padding:10px 20px; margin-bottom:10px; box-shadow:var(--shadow);
    animation:fadeUp .2s ease;
  }
  .sel-count {
    font-size:13px; font-weight:700; color:var(--accent);
    background:var(--accent-light); border:1px solid rgba(58,110,30,.2);
    padding:4px 12px; border-radius:20px; white-space:nowrap;
  }
  .sel-cancel-btn {
    display:flex; align-items:center; gap:5px;
    font-family:'Pretendard',sans-serif; font-size:12px; font-weight:600;
    color:var(--text2); background:#fff; border:1px solid var(--border);
    border-radius:8px; padding:6px 13px; cursor:pointer; transition:all .15s;
  }
  .sel-cancel-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
  .sel-del-btn {
    display:flex; align-items:center; gap:5px;
    font-family:'Pretendard',sans-serif; font-size:12px; font-weight:600;
    color:var(--text2); background:#fff; border:1px solid var(--border);
    border-radius:8px; padding:6px 13px; cursor:pointer; transition:all .15s;
  }
  .sel-del-btn:hover { border-color:var(--red); color:var(--red); background:rgba(224,80,80,.06); }
  .sel-del-btn:disabled { opacity:.5; cursor:wait; }
  /* 프린트 스타일 */
  @media print {
    .topbar, .sidebar, .sidebar-overlay, .filter-bar,
    .modal-overlay, .lightbox { display:none !important; }
    .main { display:block !important; }
    .content { padding:0 !important; }
    #export-area { padding:20px; }
    .cards-table-wrap { box-shadow:none !important; border:1px solid #ddd !important; }
    body { background:#fff !important; }
    .stats-grid { break-inside:avoid; }
    .cards-table tbody tr { break-inside:avoid; }
  }
  @media (max-width:900px) { .filter-fields { grid-template-columns:repeat(2,1fr); } }
  @media (max-width:500px) { .filter-fields { grid-template-columns:1fr; } }

/* ── TABLE ── */
.cards-table-wrap {
  background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow); overflow:hidden;
}
.cards-table { width:100%; border-collapse:collapse; }
.cards-table thead th {
  font-size:11px; font-weight:700; color:var(--text3); letter-spacing:.07em; text-transform:uppercase;
  padding:12px 16px; border-bottom:1px solid var(--border); background:#fafbfc;
  white-space:nowrap; text-align:left; user-select:none;
}
.cards-table thead th:first-child { padding-left:20px; }
.cards-table thead th:last-child { padding-right:20px; text-align:right; }
.cards-table tbody tr {
  border-bottom:1px solid var(--border); cursor:pointer;
  transition:background .1s; animation:fadeUp .25s ease both;
}
.cards-table tbody tr:last-child { border-bottom:none; }
.cards-table tbody tr:hover { background:#f8faf8; }
.cards-table tbody td { padding:13px 16px; vertical-align:middle; }
.cards-table tbody td:first-child { padding-left:20px; }
.cards-table tbody td:last-child { padding-right:20px; text-align:right; }
.tbl-author { display:flex; align-items:center; gap:8px; }
.tbl-avatar {
  width:28px; height:28px; border-radius:50%; background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:#fff; flex-shrink:0;
}
.tbl-name { font-size:13px; font-weight:600; color:var(--text1); white-space:nowrap; }
.tbl-email { font-size:11px; color:var(--text3); }
.tbl-task { font-size:13px; font-weight:600; color:var(--text1); max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tbl-stage {
  font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
  padding:3px 9px; border-radius:5px; background:var(--accent-light); color:var(--accent); white-space:nowrap;
}
.tbl-date { font-size:12px; color:var(--text2); white-space:nowrap; }
.tbl-tools { display:flex; flex-wrap:wrap; gap:4px; max-width:180px; }
.card-tool-tag {
  font-size:10px; font-weight:600; color:var(--blue);
  background:rgba(58,110,247,.08); border:1px solid rgba(58,110,247,.18);
  padding:2px 7px; border-radius:4px; white-space:nowrap;
}
.tbl-qa-badge { font-size:11px; font-weight:700; padding:3px 9px; border-radius:5px; }
.tbl-qa-badge.y { background:rgba(58,140,80,.12); color:#3a8c50; }
.tbl-qa-badge.n { background:rgba(224,80,80,.1); color:var(--red); }
.tbl-del {
  background:none; border:none; font-size:14px; cursor:pointer;
  opacity:0; transition:opacity .15s; padding:4px 6px; border-radius:6px; color:var(--text3);
}
tr:hover .tbl-del { opacity:1; }
.tbl-del:hover { background:rgba(224,80,80,.1); color:var(--red); }

/* 모바일에서 테이블 스크롤 */
@media (max-width:768px) {
  .cards-table-wrap { overflow-x:auto; }
  .cards-table { min-width:700px; }
}

/* ── EMPTY / LOADING ── */
.empty-state {
  text-align:center; padding:80px 20px; color:var(--text3);
  display:flex; flex-direction:column; align-items:center; gap:12px;
  grid-column:1/-1;
}
.empty-icon { font-size:40px; opacity:.4; }
.empty-text { font-size:14px; }
.loading-wrap { grid-column:1/-1; display:flex; flex-direction:column; align-items:center; gap:16px; padding:80px 0; }
.spinner { width:36px; height:36px; border:2.5px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }

/* ── MODAL ── */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,.45); backdrop-filter:blur(4px);
  align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto;
}
.modal-overlay.open { display:flex; animation:fadeIn .2s ease; }
.modal-box {
  background:#fff; border-radius:20px; width:100%; max-width:740px;
  box-shadow:0 20px 60px rgba(0,0,0,.18); animation:slideUp .25s ease; overflow:hidden;
}
.modal-header {
  background:linear-gradient(135deg, #2a5a12, #3a7a1e);
  padding:22px 28px; display:flex; align-items:center; justify-content:space-between;
}
.modal-header-left { display:flex; align-items:center; gap:14px; }
.modal-emoji { font-size:26px; }
.modal-title { font-size:17px; font-weight:700; color:#fff; }
.modal-subtitle { font-size:12px; color:rgba(255,255,255,.7); margin-top:2px; }
.modal-close {
  background:rgba(255,255,255,.15); border:none; color:#fff;
  font-size:18px; cursor:pointer; width:34px; height:34px;
  border-radius:8px; transition:background .15s; display:flex; align-items:center; justify-content:center;
}
.modal-close:hover { background:rgba(255,255,255,.28); }
.modal-body { padding:28px; max-height:72vh; overflow-y:auto; }
.modal-sec { margin-bottom:24px; }
.modal-sec-title {
  font-size:10px; font-weight:700; color:var(--text3); letter-spacing:.12em;
  text-transform:uppercase; margin-bottom:12px; padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.modal-row { display:flex; gap:10px; margin-bottom:8px; align-items:flex-start; }
.modal-label { font-size:12px; color:var(--text3); min-width:80px; padding-top:1px; }
.modal-val { font-size:13px; color:var(--text1); flex:1; line-height:1.5; }
.modal-tag { font-size:11px; font-weight:600; padding:3px 10px; border-radius:5px; background:var(--bg3); color:var(--text2); }
.wf-table { width:100%; border-collapse:collapse; font-size:13px; }
.wf-table th { text-align:left; font-size:10px; font-weight:700; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; padding:6px 10px; border-bottom:1px solid var(--border); }
.wf-table td { padding:10px; border-bottom:1px solid var(--border); color:var(--text2); vertical-align:top; }
.wf-table tr:last-child td { border-bottom:none; }
.wf-step-num { background:var(--text1); color:#fff; border-radius:5px; font-size:11px; font-weight:700; padding:3px 8px; white-space:nowrap; }
.qa-row-item { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
.qa-row-item:last-child { border-bottom:none; }
.qa-yn { font-size:11px; font-weight:700; padding:2px 8px; border-radius:4px; flex-shrink:0; }
.qa-yn.y { background:rgba(58,140,80,.12); color:var(--green); }
.qa-yn.n { background:rgba(224,80,80,.12); color:var(--red); }
.qa-yn.empty { background:var(--bg4); color:var(--text3); }
.qa-item-text { font-size:13px; color:var(--text2); flex:1; }
.qa-item-detail { font-size:12px; color:var(--text3); margin-top:4px; }
/* 결과물 이미지 */
.img-grid-admin { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; }
.img-thumb {
  width:100%; aspect-ratio:16/9; object-fit:cover; border-radius:8px;
  border:1px solid var(--border); cursor:pointer; transition:all .15s;
}
.img-thumb:hover { opacity:.85; transform:scale(1.02); box-shadow:var(--shadow2); }
/* 드라이브 링크 */
.drive-links { display:flex; flex-direction:column; gap:8px; }
.drive-link-item { display:flex; align-items:center; gap:10px; }
.drive-tag-admin {
  font-size:10px; font-weight:700; padding:3px 9px; border-radius:5px;
  background:var(--bg4); color:var(--text2); white-space:nowrap; flex-shrink:0;
}
.drive-link-item a { font-size:13px; color:var(--blue); word-break:break-all; }
/* 인포그래픽 */
.infographic-wrap { background:#f8f9fa; border-radius:10px; padding:16px; border:1px solid var(--border); }
.infographic-wrap svg { width:100%; height:auto; }
.infographic-btn {
  display:flex; align-items:center; gap:8px; background:var(--accent-light);
  border:1px solid rgba(58,110,30,.25); color:var(--accent);
  font-family:'Pretendard',sans-serif; font-size:13px; font-weight:700;
  border-radius:9px; padding:10px 18px; cursor:pointer; transition:all .15s; margin-bottom:12px;
}
.infographic-btn:hover { background:rgba(58,110,30,.15); }
.save-svg-btn {
  display:block; width:100%; margin-top:10px; background:var(--bg3);
  border:1px solid var(--border); color:var(--text2); font-family:'Pretendard',sans-serif;
  font-size:13px; font-weight:600; border-radius:8px; padding:9px; cursor:pointer; transition:all .15s;
}
.save-svg-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }

/* ── LIGHTBOX ── */
.lightbox {
  display:none; position:fixed; inset:0; z-index:3000;
  background:rgba(0,0,0,.9); flex-direction:column;
  align-items:center; justify-content:center;
}
.lightbox.open { display:flex; }
.lightbox-close {
  position:fixed; top:16px; right:16px; color:#fff; font-size:18px;
  cursor:pointer; background:rgba(255,255,255,.15); border:none;
  border-radius:8px; width:36px; height:36px; transition:background .15s;
  display:flex; align-items:center; justify-content:center;
}
.lightbox-close:hover { background:rgba(255,255,255,.28); }
.lb-controls {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.1); border:.5px solid rgba(255,255,255,.18);
  border-radius:12px; padding:8px 14px; margin-bottom:14px; flex-shrink:0;
}
.lb-btn {
  background:rgba(255,255,255,.12); border:none; color:#fff;
  font-size:16px; width:34px; height:34px; border-radius:8px;
  cursor:pointer; transition:background .15s;
  display:flex; align-items:center; justify-content:center;
}
.lb-btn:hover { background:rgba(255,255,255,.25); }
.lb-scale-label { font-family:'Pretendard',sans-serif; font-size:13px; font-weight:600; color:#ddd; min-width:48px; text-align:center; }
.lb-img-wrap {
  overflow:hidden; display:flex; align-items:center; justify-content:center;
  width:90vw; height:78vh; cursor:grab; user-select:none;
}
.lb-img-wrap.grabbing { cursor:grabbing; }
.lb-img-wrap img { max-width:100%; max-height:100%; border-radius:8px; object-fit:contain; transform-origin:center; transition:transform .15s ease; pointer-events:none; }

/* ── MOBILE OVERLAY ── */
.sidebar-overlay { display:none; position:fixed; inset:0; z-index:150; background:rgba(0,0,0,.3); }

/* ── RESPONSIVE ── */
@media (max-width:1100px) { .stats-grid { grid-template-columns:repeat(2,1fr); } }
@media (max-width:768px) {
  .topbar { padding:0 16px; }
  .topbar-divider,.topbar-stat { display:none; }
  .topbar-title { font-size:13px; }
  .menu-btn { display:flex; }
  .sidebar {
    position:fixed; top:60px; left:0; bottom:0; z-index:200;
    transform:translateX(-100%); box-shadow:var(--shadow2); width:260px;
  }
  .sidebar.open { transform:translateX(0); }
  .sidebar-overlay.show { display:block; }
  .content { padding:16px; }
  .stats-grid { grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
  .stat-value { font-size:24px; }
  .cards-grid { grid-template-columns:1fr; }
  .modal-body { max-height:80vh; }
  .wf-table { font-size:12px; }
}
@media (max-width:480px) {
  .stats-grid { grid-template-columns:1fr 1fr; gap:8px; }
  .stat-card { padding:14px 16px; }
  .setup-card { padding:32px 24px; }
  .topbar-right .tb-logout { display:none; }
}

/* ── ANIMATIONS ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<script>
let SB_URL='', SB_KEY='', allCards=[], currentStage='all', currentSort='newest';
let selFilters = { name:new Set(), stage:new Set(), tool:new Set() };
let taskKeywords = [];

const QA_LABELS = { accuracy:'정확성', completeness:'완성도', usability:'활용 가능성', format:'형식 적합성', bias:'편향·오류 검토', prompt:'프롬프트 최적화' };

// ── SETUP ──
const saved = { url: localStorage.getItem('admin_sb_url'), key: localStorage.getItem('admin_sb_key') };
if (saved.url && saved.key) {
  document.getElementById('sb-url').value = saved.url;
  document.getElementById('sb-key').value = saved.key;
  SB_URL = saved.url; SB_KEY = saved.key;
  showDashboard(); fetchCards();
}
document.getElementById('connect-btn').addEventListener('click', connect);
['sb-url','sb-key'].forEach(id => document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') connect(); }));

async function connect() {
  const url = document.getElementById('sb-url').value.trim();
  const key = document.getElementById('sb-key').value.trim();
  const errEl = document.getElementById('setup-err');
  if (!url||!key) { errEl.textContent='URL과 Key를 모두 입력해주세요'; return; }
  errEl.textContent=''; document.getElementById('connect-btn').textContent='연결 중...';
  try {
    const res = await fetch(`${url}/rest/v1/cards?limit=1`, { headers:{'apikey':key,'Authorization':`Bearer ${key}`} });
    if (!res.ok) throw new Error();
    SB_URL=url; SB_KEY=key;
    localStorage.setItem('admin_sb_url',url); localStorage.setItem('admin_sb_key',key);
    showDashboard(); fetchCards();
  } catch { errEl.textContent='연결 실패: URL과 Key를 확인해주세요'; document.getElementById('connect-btn').textContent='연결하기 →'; }
}
function showDashboard() { document.getElementById('setup-screen').style.display='none'; document.getElementById('dashboard').style.display='block'; }

// ── FETCH ──
async function fetchCards() {
  document.getElementById('cards-grid').innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div style="font-size:13px;color:var(--text3)">불러오는 중...</div></div>';
  try {
    const res = await fetch(`${SB_URL}/rest/v1/cards?select=*&order=created_at.desc`, { headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`} });
    if (!res.ok) throw new Error('fetch 실패');
    const rows = await res.json();
    allCards = rows.map(r => { try { return {...JSON.parse(r.data), _id:r.id, _created:r.created_at}; } catch { return {_id:r.id,_created:r.created_at}; } });
    updateStats(); updateBadges(); initMsDropdowns(); renderCards();
  } catch(e) { document.getElementById('cards-grid').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠</div><div class="empty-text">${e.message}</div></div>`; }
}

function updateStats() {
  const total = allCards.length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('total-count').textContent = total;
  const week = allCards.filter(c => new Date(c._created) > new Date(Date.now()-7*86400000)).length;
  document.getElementById('stat-week').textContent = week;
  const toolCnt = {};
  allCards.forEach(c => (c.toolActive||[]).forEach(t => { toolCnt[t]=(toolCnt[t]||0)+1; }));
  const top = Object.entries(toolCnt).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stat-tool').textContent = top ? top[0] : '—';
  document.getElementById('stat-tool-sub').textContent = top ? `${top[1]}회 사용` : '';
  let y=0, t=0;
  allCards.forEach(c => { if(c.qaData) Object.values(c.qaData).forEach(v => { if(v.val){t++; if(v.val==='y')y++;} }); });
  document.getElementById('stat-qa').textContent = t>0 ? `${Math.round(y/t*100)}%` : '—';
}

function updateBadges() {
  document.getElementById('badge-all').textContent = allCards.length;
  ['관리단계','분석단계','설계단계','테스트단계','배포및완료단계'].forEach(s => {
    const el=document.getElementById('badge-'+s); if(el) el.textContent=allCards.filter(c=>c.stage===s).length;
  });
}

function getFiltered() {
  let list = [...allCards];
  if (currentStage !== 'all') list = list.filter(c => c.stage === currentStage);

  const hasFilter = selFilters.name.size || selFilters.stage.size || selFilters.tool.size || taskKeywords.length;
  if (hasFilter) {
    list = list.filter(c => {
      const mName  = selFilters.name.size  ? selFilters.name.has(c.editName||'')  : false;
      const mStage = selFilters.stage.size ? selFilters.stage.has(c.stage||'')    : false;
      const mTool  = selFilters.tool.size  ? (c.toolActive||[]).some(t => selFilters.tool.has(t)) : false;
      const mTask  = taskKeywords.length   ? taskKeywords.some(kw => (c.task||'').toLowerCase().includes(kw.toLowerCase())) : false;
      return mName || mStage || mTool || mTask;
    });
  }

  if (currentSort==='newest') list.sort((a,b)=>new Date(b._created)-new Date(a._created));
  else if (currentSort==='oldest') list.sort((a,b)=>new Date(a._created)-new Date(b._created));
  else list.sort((a,b)=>(a.editName||'').localeCompare(b.editName||''));
  return list;
}

function renderFilterTags() {
  const wrap = document.getElementById('filter-tags');
  if (!wrap) return;
  wrap.innerHTML = '';
  const add = (label, val, onRemove) => {
    const tag = document.createElement('div'); tag.className='filter-tag';
    tag.innerHTML = `<span>${label}: <b>${val}</b></span><button class="filter-tag-x">✕</button>`;
    tag.querySelector('.filter-tag-x').addEventListener('click', onRemove);
    wrap.appendChild(tag);
  };
  selFilters.name.forEach(v => add('이름', v, () => { selFilters.name.delete(v); syncMsUI('name'); renderFilterTags(); renderCards(); }));
  selFilters.stage.forEach(v => add('단계', v, () => { selFilters.stage.delete(v); syncMsUI('stage'); renderFilterTags(); renderCards(); }));
  selFilters.tool.forEach(v => add('도구', v, () => { selFilters.tool.delete(v); syncMsUI('tool'); renderFilterTags(); renderCards(); }));
  taskKeywords.forEach(v => add('소재명', v, () => { taskKeywords=taskKeywords.filter(k=>k!==v); renderTaskTags(); renderFilterTags(); renderCards(); }));
}

function syncMsUI(key) {
  const list = document.getElementById('ms-'+key+'-list');
  if (!list) return;
  list.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.checked = selFilters[key].has(cb.value); });
  updateMsLabel(key);
}

function updateMsLabel(key) {
  const set = selFilters[key]; const labelEl = document.getElementById('ms-'+key+'-label');
  if (!labelEl) return;
  if (set.size === 0) { labelEl.textContent = {name:'전체 이름', stage:'전체 단계', tool:'전체 도구'}[key]; labelEl.classList.remove('has-val'); }
  else { labelEl.textContent = set.size === 1 ? [...set][0] : `${[...set][0]} 외 ${set.size-1}개`; labelEl.classList.add('has-val'); }
}

function buildMsDropdown(key, values) {
  const list = document.getElementById('ms-'+key+'-list');
  if (!list || list.children.length > 0) return;
  values.forEach(v => {
    const lbl = document.createElement('label'); lbl.className='ms-item';
    const cb = document.createElement('input'); cb.type='checkbox'; cb.value=v;
    cb.checked = selFilters[key].has(v);
    cb.addEventListener('change', () => {
      if (cb.checked) selFilters[key].add(v); else selFilters[key].delete(v);
      updateMsLabel(key); renderFilterTags(); renderCards();
    });
    const sp = document.createElement('span'); sp.textContent=v;
    lbl.append(cb,sp); list.appendChild(lbl);
  });
}

function initMsDropdowns() {
  const names = ['유경구', '이수철', '이고은', '고우정', '정수정', '이태림', '최승일'];
  const tools = [...new Set(allCards.flatMap(c=>c.toolActive||[]))].sort();

  const slist = document.getElementById('ms-stage-list');

    cb.addEventListener('change', () => {
      if (cb.checked) selFilters.stage.add(cb.value); else selFilters.stage.delete(cb.value);
      updateMsLabel('stage'); renderFilterTags(); renderCards();
    });
  });

  // 드롭다운 토글
  ['name','stage','tool'].forEach(key => {
    const trigger = document.getElementById('ms-'+key+'-trigger');
    const wrap = document.getElementById('ms-'+key);

    if (!trigger||!wrap||!dd) return;

let _lbScale=1; const _lbMin=0.5, _lbMax=4; let _lbDrag=false, _lbSX=0, _lbSY=0, _lbTX=0, _lbTY=0;
const _lbImg=document.getElementById('lightbox-img'); const _lbWrap=document.getElementById('lb-img-wrap'); const _lbLabel=document.getElementById('lb-scale-label');
function _lbApply(anim){ _lbImg.style.transition=anim?'transform .15s ease':'none'; _lbImg.style.transform=`scale(${_lbScale}) translate(${_lbTX/_lbScale}px,${_lbTY/_lbScale}px)`; _lbLabel.textContent=Math.round(_lbScale*100)+'%'; }
function _lbReset(){ _lbScale=1; _lbTX=0; _lbTY=0; _lbApply(true); }
function openLightbox(src){ document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').classList.add('open'); _lbReset(); }
document.getElementById('lb-zoom-in').addEventListener('click',()=>{ _lbScale=Math.min(_lbMax,+(_lbScale+0.25).toFixed(2)); _lbApply(true); });
document.getElementById('lb-zoom-out').addEventListener('click',()=>{ _lbScale=Math.max(_lbMin,+(_lbScale-0.25).toFixed(2)); _lbApply(true); });
document.getElementById('lb-zoom-reset').addEventListener('click',_lbReset);
_lbWrap.addEventListener('wheel',e=>{ e.preventDefault(); const d=e.deltaY<0?.15:-.15; _lbScale=Math.min(_lbMax,Math.max(_lbMin,+(_lbScale+d).toFixed(2))); _lbApply(false); },{passive:false});
_lbWrap.addEventListener('mousedown',e=>{ _lbDrag=true; _lbSX=e.clientX-_lbTX; _lbSY=e.clientY-_lbTY; _lbWrap.classList.add('grabbing'); });
window.addEventListener('mousemove',e=>{ if(!_lbDrag)return; _lbTX=e.clientX-_lbSX; _lbTY=e.clientY-_lbSY; _lbApply(false); });
window.addEventListener('mouseup',()=>{ _lbDrag=false; _lbWrap.classList.remove('grabbing'); });
_lbWrap.addEventListener('dblclick',()=>{ if(_lbScale>1)_lbReset(); else{_lbScale=2;_lbApply(true);} });
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); _lbReset(); }
document.getElementById('lightbox-close').addEventListener('click',closeLightbox);
document.getElementById('lightbox').addEventListener('click',e=>{ if(e.target===document.getElementById('lightbox'))closeLightbox(); });
document.addEventListener('keydown',e=>{ const lb=document.getElementById('lightbox'); if(!lb.classList.contains('open'))return; if(e.key==='Escape')closeLightbox(); if(e.key==='+'||e.key==='='){_lbScale=Math.min(_lbMax,+(_lbScale+.25).toFixed(2));_lbApply(true);} if(e.key==='-'){_lbScale=Math.max(_lbMin,+(_lbScale-.25).toFixed(2));_lbApply(true);} if(e.key==='0')_lbReset(); });

function updateSelBar() {
  const checked = document.querySelectorAll('.cb-row:checked');
  const mount = document.getElementById('sel-bar-mount');
  if (!mount) return;

  const all = document.querySelectorAll('.cb-row');
  const cbAll = document.getElementById('cb-all');
  if (cbAll) { cbAll.indeterminate = checked.length > 0 && checked.length < all.length; cbAll.checked = all.length > 0 && checked.length === all.length; }

  if (checked.length === 0) { mount.innerHTML = ''; return; }

  if (!document.getElementById('sel-action-bar')) {
    mount.innerHTML = `
      <div class="sel-action-bar" id="sel-action-bar">
        <span class="sel-count" id="sel-count">${checked.length}개 선택됨</span>
        <button class="sel-cancel-btn" id="sel-cancel-btn">선택 해제</button>
        <button class="sel-del-btn" id="sel-del-btn">🗑 선택 항목 삭제</button>
      </div>`;
    document.getElementById('sel-cancel-btn').addEventListener('click', () => {
      document.querySelectorAll('.cb-row').forEach(cb => cb.checked = false);
      const ca = document.getElementById('cb-all'); if (ca) { ca.checked=false; ca.indeterminate=false; }
      mount.innerHTML = '';
    });
    document.getElementById('sel-del-btn').addEventListener('click', async () => {
      const cked = [...document.querySelectorAll('.cb-row:checked')];
      if (!cked.length) return;
      if (!confirm(`선택한 ${cked.length}개 카드를 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;
      const btn = document.getElementById('sel-del-btn');
      btn.disabled=true; btn.textContent='삭제 중...';
      const ids = cked.map(cb=>cb.dataset.id);
      try {
        for (const id of ids) await fetch(`${SB_URL}/rest/v1/cards?id=eq.${id}`,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json'}});

        mount.innerHTML=''; updateStats(); updateBadges(); renderCards();

    });
  } else {
    document.getElementById('sel-count').textContent = `${checked.length}개 선택됨`;
  }
}

async function captureContent() {
  const filterBar = document.getElementById('filter-bar');
  const grid = document.getElementById('cards-grid');
  const target = document.getElementById('export-area');

  // 1. 모든 tr 인라인 animationDelay 제거 + opacity 강제 1
  const rows = target.querySelectorAll('tr, .cards-table tbody tr');
  const savedStyles = [];
  rows.forEach(r => {
    savedStyles.push({ delay: r.style.animationDelay, anim: r.style.animation, opacity: r.style.opacity });
    r.style.animationDelay = '0s';
    r.style.animation = 'none';
    r.style.opacity = '1';
  });

  // 2. 전역 kill 스타일
  const killStyle = document.createElement('style');
  killStyle.id = 'cap-kill';
  killStyle.textContent = '*, *::before, *::after { animation: none !important; transition: none !important; opacity: 1 !important; }';
  document.head.appendChild(killStyle);

  // 3. 필터바 숨김
  const fbPrev = filterBar ? filterBar.style.display : '';
  if (filterBar) filterBar.style.display = 'none';

  // 4. 테이블 높이 해제
  const prevOF = grid ? grid.style.overflow : '';
  const prevMH = grid ? grid.style.maxHeight : '';
  if (grid) { grid.style.overflow = 'visible'; grid.style.maxHeight = 'none'; }

  // 5. 2프레임 대기
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  // 6. 캡처
  const W = target.scrollWidth;
  const H = target.scrollHeight;
  const canvas = await html2canvas(target, {
    scale: 2, useCORS: true, backgroundColor: '#f4f5f7',
    x: 0, y: 0, scrollX: 0, scrollY: 0,
    width: W, height: H,
    windowWidth: W + 100, windowHeight: H + 100,
  });

  // 7. 복구
  killStyle.remove();
  if (filterBar) filterBar.style.display = fbPrev;
  if (grid) { grid.style.overflow = prevOF; grid.style.maxHeight = prevMH; }
  rows.forEach((r, i) => {
    r.style.animationDelay = savedStyles[i].delay;
    r.style.animation = savedStyles[i].anim;
    r.style.opacity = savedStyles[i].opacity;
  });

  return canvas;
}

    const a = document.createElement('a');
    a.download = `UXD2_어드민_${new Date().toISOString().slice(0,10)}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch(e) { alert('이미지 저장 실패: ' + e.message); }
  finally { btn.disabled = false; btn.querySelector('.export-label').textContent = '이미지'; }
});

document.getElementById('btn-del-unnamed')?.addEventListener('click', async () => {
  const unnamed = allCards.filter(c => !c.editName || c.editName.trim() === '' || c.editName === '미입력');
  if (!unnamed.length) { alert('작성자 미입력 데이터가 없습니다.'); return; }
  if (!confirm(`작성자 미입력 카드 ${unnamed.length}개를 모두 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;
  const btn = document.getElementById('btn-del-unnamed');
  btn.disabled = true; btn.querySelector('.export-label').textContent = '삭제 중...';
  try {
    const ids = unnamed.map(c => c._id);
    for (const id of ids) {
      await fetch(`${SB_URL}/rest/v1/cards?id=eq.${id}`, {
        method: 'DELETE',
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' }
      });
    }
    allCards = allCards.filter(c => !ids.includes(c._id));
    updateStats(); updateBadges(); renderCards();
    alert(`${ids.length}개 삭제 완료`);
  } catch(e) { alert('삭제 실패: ' + e.message); }
  finally { btn.disabled = false; btn.querySelector('.export-label').textContent = '미입력 삭제'; }
});

document.getElementById('btn-print')?.addEventListener('click', () => {
  window.print();
});

// 모바일 사이드바
document.getElementById('menu-btn').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
});
document.getElementById('sidebar-overlay').addEventListener('click',()=>{

// ── INFOGRAPHIC SVG ──
function generateFlowSVG(rows){
  const n=rows.length,W=640,pad=20,ROW_MAX=4,sumRowH=80;
  const rows_sum=Math.ceil(n/ROW_MAX),sumH=rows_sum*sumRowH+(rows_sum-1)*10+20,sumY=44;
  let sumItems='';
  for(let i=0;i<n;i++){
    const rI=Math.floor(i/ROW_MAX),cI=i%ROW_MAX,cC=Math.min(ROW_MAX,n-rI*ROW_MAX);
    const bW=Math.floor((W-pad*2-(cC-1)*24)/cC),bH=52;
    const rx=pad+cI*(bW+24),ry=sumY+rI*(sumRowH+10),cy=ry+bH/2;
    const tool=rows[i].tool||`STEP ${i+1}`;
    sumItems+=`<rect x="${rx}" y="${ry}" width="${bW}" height="${bH}" rx="10" fill="#eef1ff" stroke="#4f6ef7" stroke-width="1"/>
      <circle cx="${rx+16}" cy="${cy}" r="11" fill="#4f6ef7"/>
      <text x="${rx+16}" y="${cy+4}" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" font-family="sans-serif">${i+1}</text>
      <text x="${rx+33}" y="${cy-6}" font-size="9" fill="#888" font-family="sans-serif">STEP.${i+1}</text>
      <text x="${rx+33}" y="${cy+9}" font-size="12" font-weight="600" fill="#222" font-family="sans-serif">${tool.length>10?tool.slice(0,10)+'…':tool}</text>`;
    const isLR=(cI===ROW_MAX-1)||(i===n-1),isLO=i===n-1;
    if(!isLO&&!isLR){const ax=rx+bW+2,ay=ry+bH/2;sumItems+=`<line x1="${ax}" y1="${ay}" x2="${ax+20}" y2="${ay}" stroke="#4f6ef7" stroke-width="1.5" stroke-dasharray="3 2"/><polygon points="${ax+20},${ay-4} ${ax+26},${ay} ${ax+20},${ay+4}" fill="#4f6ef7"/>`;}
    if(!isLO&&isLR){const fX=rx+bW,fY=ry+bH/2,tX=pad,tY=ry+sumRowH+10+bH/2,mY=ry+Math.round((bH+sumRowH+10)/2);sumItems+=`<path d="M${fX} ${fY} L${fX+12} ${fY} L${fX+12} ${mY} L${tX-12} ${mY} L${tX-12} ${tY} L${tX} ${tY}" fill="none" stroke="#4f6ef7" stroke-width="1.5" stroke-dasharray="3 2"/><polygon points="${tX},${tY-4} ${tX+6},${tY} ${tX},${tY+4}" fill="#4f6ef7"/>`;}
  }
  const dSY=sumY+sumH+40,cH=90,gap=36;let dI='',tdH=0;
  for(let i=0;i<n;i++){
    const y=dSY+i*(cH+gap),r=rows[i],tr=(s,m)=>s.length>m?s.slice(0,m)+'…':s;
    const tool=r.tool||'미선택',intent=r.intent||'-',action=r.action||'-';
    dI+=`<rect x="${pad}" y="${y}" width="${W}" height="${cH}" rx="12" fill="#fff" stroke="#e8eaed" stroke-width="1"/>
      <circle cx="${pad+28}" cy="${y+cH/2}" r="18" fill="#4f6ef7"/>
      <text x="${pad+28}" y="${y+cH/2-5}" text-anchor="middle" font-size="8" fill="#c7d0ff" font-family="sans-serif" font-weight="600">STEP</text>
      <text x="${pad+28}" y="${y+cH/2+9}" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" font-family="sans-serif">${i+1}</text>
      <text x="${pad+60}" y="${y+cH/2-8}" font-size="9" fill="#aaa" font-family="sans-serif">TOOL</text>
      <text x="${pad+60}" y="${y+cH/2+10}" font-size="14" font-weight="700" fill="#222" font-family="sans-serif">${tr(tool,12)}</text>
      <line x1="${pad+155}" y1="${y+16}" x2="${pad+155}" y2="${y+cH-16}" stroke="#f0f0f0" stroke-width="1"/>
      <text x="${pad+170}" y="${y+cH/2-8}" font-size="9" fill="#aaa" font-family="sans-serif">의도 INTENT</text>
      <text x="${pad+170}" y="${y+cH/2+10}" font-size="12" fill="#333" font-family="sans-serif">${tr(intent,22)}</text>
      <line x1="${pad+390}" y1="${y+16}" x2="${pad+390}" y2="${y+cH-16}" stroke="#f0f0f0" stroke-width="1"/>
      <text x="${pad+405}" y="${y+cH/2-8}" font-size="9" fill="#aaa" font-family="sans-serif">활동</text>
      <text x="${pad+405}" y="${y+cH/2+10}" font-size="12" fill="#333" font-family="sans-serif">${tr(action,20)}</text>`;
    if(i<n-1){const ax=pad+W/2,ay=y+cH+4;dI+=`<line x1="${ax}" y1="${ay}" x2="${ax}" y2="${ay+gap-8}" stroke="#4f6ef7" stroke-width="1.5" stroke-dasharray="3 2"/><polygon points="${ax-5},${ay+gap-10} ${ax},${ay+gap-4} ${ax+5},${ay+gap-10}" fill="#4f6ef7"/>`;}
    tdH=y+cH-dSY;
  }
  const tH=dSY+tdH+40;
  return `<svg width="100%" viewBox="0 0 680 ${tH}" xmlns="http://www.w3.org/2000/svg"><rect width="680" height="${tH}" fill="#f8f9fa" rx="12"/>
    <text x="${pad}" y="26" font-size="10" font-weight="600" fill="#aaa" font-family="sans-serif" letter-spacing="1">SUMMARY FLOW</text>
    ${sumItems}
    <line x1="${pad}" y1="${dSY-20}" x2="${W+pad}" y2="${dSY-20}" stroke="#ececec" stroke-width="1"/>
    <text x="${pad}" y="${dSY-6}" font-size="10" font-weight="600" fill="#aaa" font-family="sans-serif" letter-spacing="1">DETAIL FLOW</text>
    ${dI}</svg>`;
}
</script>
